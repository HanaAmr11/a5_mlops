name: MLOps Validation and Deployment Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: python train.py

      - name: Show Run ID
        run: cat model_info.txt

      - name: Save accuracy for deploy job
        run: |
          python - <<'PY'
          import os
          import mlflow

          tracking_uri = os.getenv("MLFLOW_TRACKING_URI", "file:./mlruns")
          mlflow.set_tracking_uri(tracking_uri)

          with open("model_info.txt", "r") as f:
              run_id = f.read().strip()

          run = mlflow.get_run(run_id)
          accuracy = run.data.metrics.get("accuracy")

          with open("accuracy.txt", "w") as f:
              f.write(str(accuracy))

          print(f"Run ID: {run_id}")
          print(f"Accuracy saved: {accuracy}")
          PY

      - name: Upload run id artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Upload accuracy artifact
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-info
          path: accuracy.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download run id artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download accuracy artifact
        uses: actions/download-artifact@v4
        with:
          name: accuracy-info

      - name: Check threshold
        run: |
          python - <<'PY'
          import sys

          THRESHOLD = 0.85

          with open("model_info.txt", "r") as f:
              run_id = f.read().strip()

          with open("accuracy.txt", "r") as f:
              accuracy = float(f.read().strip())

          print(f"Run ID: {run_id}")
          print(f"Accuracy: {accuracy}")
          print(f"Threshold: {THRESHOLD}")

          if accuracy < THRESHOLD:
              print("Model accuracy is below threshold. Deployment failed.")
              sys.exit(1)

          print("Model passed threshold. Deployment can continue.")
          PY

      - name: Mock Docker build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"